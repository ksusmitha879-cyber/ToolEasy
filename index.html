<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explain Like I'm 5</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFBF0; --surface: #FFFFFF; --border: #EDE8D8; --border-md: #D8D0B8;
      --text: #1A1708; --muted: #6B6540; --hint: #A09870;
      --accent: #E08020; --accent-lt: #FFF3E0; --accent-dk: #A05010;
      --purple: #7040C0; --purple-lt: #F0EAFF;
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06); --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141208; --surface: #1E1C10; --border: #2E2C18; --border-md: #3E3A28;
        --text: #F0EDD8; --muted: #9E9870; --hint: #6B6840;
        --accent: #F0A040; --accent-lt: #2A1E08; --accent-dk: #FFD080;
        --purple: #A080F0; --purple-lt: #1A1030;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 3rem 1rem 2rem; }
    .container { max-width: 620px; width: 100%; }
    .header { text-align: center; margin-bottom: 2.5rem; }
    .emoji { font-size: 56px; margin-bottom: 0.75rem; display: block; }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: var(--muted); line-height: 1.5; max-width: 420px; margin: 0 auto; }
    .search-wrap { position: relative; margin-bottom: 1rem; }
    .search-input { width: 100%; padding: 16px 60px 16px 20px; background: var(--surface); border: 2px solid var(--border); border-radius: 99px; font-size: 17px; color: var(--text); font-family: inherit; outline: none; transition: all 0.2s; box-shadow: var(--shadow-lg); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent), var(--shadow-lg); }
    .search-input::placeholder { color: var(--hint); }
    .search-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: var(--accent); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 18px; transition: opacity 0.15s; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .search-btn.loading { animation: spin 0.65s linear infinite; }
    .search-btn.loading i { display: none; }
    .search-btn.loading::after { content: ''; display: block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; }
    .topics { display: flex; flex-wrap: wrap; justify-content: center; gap: 7px; margin-bottom: 2rem; }
    .topic { font-size: 13px; padding: 6px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 99px; cursor: pointer; color: var(--muted); font-family: inherit; transition: all 0.15s; }
    .topic:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .output-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-lg); animation: fadeUp 0.3s ease; }
    .output-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--accent-lt); border-bottom: 1px solid var(--border); }
    .topic-label { font-size: 14px; font-weight: 600; color: var(--accent-dk); display: flex; align-items: center; gap: 8px; }
    .topic-label i { font-size: 16px; }
    .actions { display: flex; gap: 7px; }
    .action-btn { display: flex; align-items: center; gap: 5px; padding: 6px 11px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .action-btn:hover { background: var(--bg); }
    .output-body { padding: 1.75rem; }
    .explanation { font-size: 16px; line-height: 1.9; color: var(--text); white-space: pre-wrap; }
    .output-footer { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .footer-text { font-size: 12px; color: var(--hint); }
    .simplify-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--purple-lt); border: 1px solid var(--purple); border-radius: 99px; font-size: 13px; font-weight: 600; color: var(--purple); cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .simplify-btn:hover { background: var(--purple); color: #fff; }
    .simplify-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-box { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; background: #FEF0EE; border: 1px solid #F09090; border-radius: var(--radius-md); font-size: 13px; color: #8A1A10; margin-bottom: 1rem; }
    @media (prefers-color-scheme: dark) { .error-box { background: #2A1008; color: #FF9080; border-color: #8A3020; } }
    .history { margin-bottom: 1rem; }
    .history-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--hint); margin-bottom: 8px; }
    .history-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .history-chip { font-size: 12px; padding: 4px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 99px; cursor: pointer; color: var(--muted); font-family: inherit; display: flex; align-items: center; gap: 5px; }
    .history-chip:hover { border-color: var(--accent); color: var(--accent); }
    .history-chip i { font-size: 12px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="emoji">🧒</span>
    <h1>Explain Like I'm 5</h1>
    <p class="subtitle">Type any complex topic and get a simple, analogy-based explanation anyone can understand.</p>
  </div>

  <div class="search-wrap">
    <input type="text" class="search-input" id="topicInput" placeholder="e.g. Quantum entanglement, inflation, DNA…" />
    <button class="search-btn" id="searchBtn" onclick="explain()"><i class="ti ti-arrow-right"></i></button>
  </div>

  <div class="topics">
    <button class="topic" onclick="setTopic('Quantum entanglement')">Quantum entanglement</button>
    <button class="topic" onclick="setTopic('How the stock market works')">Stock market</button>
    <button class="topic" onclick="setTopic('Artificial intelligence')">Artificial intelligence</button>
    <button class="topic" onclick="setTopic('How vaccines work')">How vaccines work</button>
    <button class="topic" onclick="setTopic('Black holes')">Black holes</button>
    <button class="topic" onclick="setTopic('Blockchain')">Blockchain</button>
    <button class="topic" onclick="setTopic('How the internet works')">How the internet works</button>
    <button class="topic" onclick="setTopic('Climate change')">Climate change</button>
  </div>

  <div id="errorBox" style="display:none"></div>
  <div id="historyWrap" style="display:none" class="history">
    <p class="history-label">Recent topics</p>
    <div class="history-chips" id="historyChips"></div>
  </div>

  <div id="outputCard" class="output-card" style="display:none">
    <div class="output-header">
      <div class="topic-label"><i class="ti ti-bulb"></i><span id="topicLabel"></span></div>
      <div class="actions">
        <button class="action-btn" onclick="copyOutput()"><i class="ti ti-copy" style="font-size:13px"></i> Copy</button>
      </div>
    </div>
    <div class="output-body">
      <div class="explanation" id="explanationText"></div>
    </div>
    <div class="output-footer">
      <span class="footer-text">Still confused? Try simplifying further.</span>
      <button class="simplify-btn" id="simplifyBtn" onclick="simplifyFurther()">
        <i class="ti ti-arrows-minimize" style="font-size:14px"></i> Simplify further
      </button>
    </div>
  </div>
</div>

<script>
  let currentTopic = '';
  let simplifyLevel = 0;
  let searchHistory = [];

  function setTopic(topic) {
    document.getElementById('topicInput').value = topic;
    explain();
  }

  document.getElementById('topicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') explain();
  });

  async function explain(extraSimple = false) {
    const topic = document.getElementById('topicInput').value.trim();
    if (!topic) return;

    currentTopic = topic;
    if (!extraSimple) simplifyLevel = 0;

    setLoading(true);
    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('outputCard').style.display = 'none';

    const levelInstructions = simplifyLevel === 0
      ? 'Explain as if I am a curious 5-year-old. Use simple words.'
      : simplifyLevel === 1
      ? 'Explain as if I am a toddler. Use only the very simplest words possible. Make it even more basic.'
      : 'Explain using only toy, food, or animal comparisons. No concepts at all — pure concrete analogy only.';

    const prompt = `${levelInstructions}

Topic: ${topic}

Rules:
- Do NOT use any industry jargon or technical terms
- Use EXACTLY one everyday analogy involving toys, food, or animals — make it the centerpiece
- Keep it under 150 words
- End with one "Fun fact:" sentence that surprises or delights
- Write only the explanation — no intro like "Sure!" or "Great question!"`;

    try {
      const res = await fetch('/.netlify/functions/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 500,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const explanation = data.content.map(b => b.text || '').join('').trim();

      document.getElementById('topicLabel').textContent = topic;
      document.getElementById('explanationText').textContent = explanation;
      document.getElementById('outputCard').style.display = 'block';
      document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      document.getElementById('simplifyBtn').disabled = simplifyLevel >= 2;

      if (!searchHistory.includes(topic)) {
        searchHistory.unshift(topic);
        if (searchHistory.length > 6) searchHistory.pop();
        renderHistory();
      }
    } catch (err) {
      showError('Could not explain: ' + err.message);
    } finally {
      setLoading(false);
    }
  }

  async function simplifyFurther() {
    simplifyLevel++;
    await explain(true);
  }

  function renderHistory() {
    const wrap = document.getElementById('historyWrap');
    const chips = document.getElementById('historyChips');
    if (searchHistory.length === 0) { wrap.style.display = 'none'; return; }
    chips.innerHTML = searchHistory.map(t =>
      `<button class="history-chip" onclick="setTopic('${t.replace(/'/g, "\\'")}')"><i class="ti ti-clock"></i>${t}</button>`
    ).join('');
    wrap.style.display = 'block';
  }

  function setLoading(on) {
    const btn = document.getElementById('searchBtn');
    btn.disabled = on;
    if (on) { btn.classList.add('loading'); }
    else { btn.classList.remove('loading'); }
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.className = 'error-box';
    box.style.display = 'flex';
    box.innerHTML = `<i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0"></i><span>${msg}</span>`;
  }

  function copyOutput() {
    navigator.clipboard.writeText(document.getElementById('explanationText').textContent).then(() => {
      const btn = document.querySelector('.action-btn');
      btn.innerHTML = '<i class="ti ti-check" style="font-size:13px"></i> Copied!';
      setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy" style="font-size:13px"></i> Copy'; }, 2000);
    });
  }
</script>
</body>
</html>
